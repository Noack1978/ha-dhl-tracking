add_tracking:
  name: Sendung hinzufügen
  description: Fügt eine neue DHL-Sendungsnummer zur Verfolgung hinzu und erstellt einen Sensor-Eintrag.
  fields:
    tracking_number:
      name: Sendungsnummer
      description: Die DHL-Sendungsnummer (z. B. 1Z999AA10123456784)
      required: true
      example: "1234567890"
      selector:
        text:
    label:
      name: Bezeichnung
      description: Eine optionale lesbare Bezeichnung für diese Sendung
      example: "Amazon Bestellung Mai"
      selector:
        text:
    entry_id:
      name: Integrations-ID
      description: Nur erforderlich, wenn mehrere DHL-Instanzen konfiguriert sind
      selector:
        config_entry:
          integration: dhl_tracking

remove_tracking:
  name: Sendung entfernen
  description: Entfernt eine Sendungsnummer und löscht den zugehörigen Sensor.
  fields:
    tracking_number:
      name: Sendungsnummer
      description: Die zu entfernende DHL-Sendungsnummer
      required: true
      selector:
        text:
    entry_id:
      name: Integrations-ID
      description: Nur erforderlich, wenn mehrere DHL-Instanzen konfiguriert sind
      selector:
        config_entry:
          integration: dhl_tracking

refresh:
  name: Sofort aktualisieren
  description: Erzwingt eine sofortige Aktualisierung aller Sendungsdaten (ignoriert das Intervall).
  fields:
    entry_id:
      name: Integrations-ID
      description: Nur erforderlich, wenn mehrere DHL-Instanzen konfiguriert sind
      selector:
        config_entry:
          integration: dhl_tracking
